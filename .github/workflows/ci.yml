name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-root:
    name: Lint CLI (Root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      # Add lint command for root if you have one, or just check node_modules installation
      - run: echo "CLI deps check passed."

  lint-template:
    name: Lint Template Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Template Dependencies
        working-directory: ./template
        run: bun install
      - name: Run Linter (Template)
        working-directory: ./template
        run: bun run linter
